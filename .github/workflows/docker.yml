name: 🐳 Build & Push freellmapi to GHCR

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=pr
            type=sha,format=short,prefix=sha-

      # ✅ 关键修改：先构建镜像并加载到本地（不推送）
      - name: 🔨 Build Docker image (load to local)
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./Dockerfile
          push: false                    # 🔴 先不推送
          load: true                     # ✅ 加载到本地 Docker 守护进程
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 如需多架构，注意：load: true 仅支持单平台
          platforms: linux/amd64

      # ✅ Trivy 扫描本地已构建的镜像（非远程）
      - name: 🛡️ Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          # ✅ 扫描本地镜像：使用标签引用，Trivy 会自动从本地找
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          cache: true
          exit-code: '0'                 # ✅ 发现漏洞不中断流程
          ignore-unfixed: true
        if: github.event_name != 'pull_request'
        continue-on-error: true

      - name: 📤 Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: github.event_name != 'pull_request'
        continue-on-error: true

      # ✅ 最后：推送镜像到 GHCR（确认扫描通过后）
      - name: 🚀 Push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}  # PR 不推送
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # 注意：push 阶段不再 cache-to，避免重复上传
          platforms: linux/amd64
